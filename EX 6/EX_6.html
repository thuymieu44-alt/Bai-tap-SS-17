<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS_6.css">
</head>
<body>
    <div class="grid">
        <input type="text" id="input">
            <button class="item-math">+</button>
            <!-- &#43; Dấu cộng -->
            <button class="item-math">&minus;</button> 
            <!-- &#8722; DẤU TRỪ TOÁN HỌC -->
            <button class="item-math">&times;</button>
            <!-- Dấu nhân -->
            <button class="item-math">&#247;</button>
            <!-- &divide; &#xF7;  Dấu chia -->
             <button class="item-number">7</button>
             <button class="item-number">8</button>
             <button class="item-number">9</button>
             <button class="item-equal">=</button>
             <button class="item-number">4</button>
             <button class="item-number">5</button>
             <button class="item-number">6</button>
             <button class="item-number">1</button>
             <button class="item-number">2</button>
             <button class="item-number">3</button>
             <button class="item-number">0</button>
             <button class="item-number">.</button>
             <button class="item-clear">C</button>
    </div>
    <script src="./JS_6.js"></script>
</body>
</html>

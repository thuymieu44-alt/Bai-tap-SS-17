<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .overlay {
            display: none;
            position: fixed;
            background-color: rgba(0,0,0,0.4);
            inset: 0;}
        .modal {
            left: 50%;
            top: 50%;
            background-color: #fefefe;
            position:absolute;
            transform: translate(-50%, -50%);
            padding:10px;
            border-radius: 5px;
            min-width: 300px;
            }
        .modal-content {
            position:relative;
        }
        .close {
            position:absolute;
            top: -10px;
            right:-10px;
        }
    </style>
</head>
<body>
    <h1>Modal Example</h1>
    <button class="open">Open Modal</button>
    <div class="overlay">
        <div class="modal">
            <div class="modal-content">
                Some text in the Modal
                <span class="close">X</span>
            </div>
        </div>
    </div>
    <script src="./JS_3.js"></script>
</body>
</html>
